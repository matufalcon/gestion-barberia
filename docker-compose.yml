version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16
    container_name: barberia_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barberia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API FastAPI
  api:
    build: .
    container_name: barberia_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/barberia_db
      SECRET_KEY: tu-clave-secreta-super-segura
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m src.models.crear_tablas &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: